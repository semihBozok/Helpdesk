<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Helpdesk Board</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="header">
        <div>
            <h1>Helpdesk Board</h1>
            <p>Tickets verwalten und bearbeiten</p>
        </div>

      <div class="header-actions">
    <button
        id="createTicketButton"
        class="primary-button"
        type="button">
        + Ticket erstellen
    </button>

    <button
        id="reloadButton"
        type="button">
        Neu laden
    </button>
</div>
    </header>

    <main>
        <section class="summary">
            <article>
                <span>Gesamt</span>
                <strong id="totalCount">0</strong>
            </article>

            <article>
                <span>Offen</span>
                <strong id="openCount">0</strong>
            </article>

            <article>
                <span>In Bearbeitung</span>
                <strong id="progressCount">0</strong>
            </article>

            <article>
                <span>Erledigt</span>
                <strong id="resolvedCount">0</strong>
            </article>
        </section>

        <p id="message">Tickets werden geladen …</p>

        <section id="ticketBoard" class="board">
    <div class="column" data-status-id="1">
    <h2>Open</h2>
    <div id="status-1" class="ticket-list"></div>
</div>

<div class="column" data-status-id="2">
    <h2>In Progress</h2>
    <div id="status-2" class="ticket-list"></div>
</div>

<div class="column" data-status-id="3">
    <h2>Resolved</h2>
    <div id="status-3" class="ticket-list"></div>
</div>

<div class="column" data-status-id="4">
    <h2>Closed</h2>
    <div id="status-4" class="ticket-list"></div>
</div>
</section>
    </main>
<dialog id="createTicketDialog">
    <div class="dialog-content">
        <div class="dialog-header">
            <div>
                <h2>Neues Ticket</h2>
                <p>Beschreibe das Problem möglichst genau.</p>
            </div>

            <button
                id="closeTicketDialogButton"
                class="close-button"
                type="button"
                aria-label="Dialog schließen">
                ×
            </button>
        </div>

        <form id="createTicketForm">
            <label for="ticketTitle">
                Titel
            </label>

            <input
                id="ticketTitle"
                name="title"
                type="text"
                maxlength="150"
                required>

            <label for="ticketDescription">
                Beschreibung
            </label>

            <textarea
                id="ticketDescription"
                name="description"
                rows="5"
                required>
            </textarea>

            <label for="ticketPriority">
                Priorität
            </label>

            <select
                id="ticketPriority"
                name="priorityId"
                required>
                <option value="">
                    Priorität auswählen
                </option>
            </select>

            <label for="ticketCreatedBy">
                Erstellt von
            </label>

            <input
                id="ticketCreatedBy"
                name="createdBy"
                type="text"
                value="Semih"
                required>

            <p
                id="createTicketError"
                class="form-error"
                aria-live="polite">
            </p>

            <div class="dialog-actions">
                <button
                    id="cancelCreateTicketButton"
                    type="button">
                    Abbrechen
                </button>

                <button
                    id="submitTicketButton"
                    class="primary-button"
                    type="submit">
                    Ticket erstellen
                </button>
            </div>
        </form>
    </div>
</dialog>
    <script src="/js/app.js"></script>
</body>
</html>
