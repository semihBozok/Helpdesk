<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Helpdesk Board</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="header">
        <div>
            <h1>Helpdesk Board</h1>
            <p>Tickets verwalten und bearbeiten</p>
        </div>

        <button id="reloadButton" type="button">
            Neu laden
        </button>
    </header>

    <main>
        <section class="summary">
            <article>
                <span>Gesamt</span>
                <strong id="totalCount">0</strong>
            </article>

            <article>
                <span>Offen</span>
                <strong id="openCount">0</strong>
            </article>

            <article>
                <span>In Bearbeitung</span>
                <strong id="progressCount">0</strong>
            </article>

            <article>
                <span>Erledigt</span>
                <strong id="resolvedCount">0</strong>
            </article>
        </section>

        <p id="message">Tickets werden geladen …</p>

        <section id="ticketBoard" class="board">
    <div class="column">
        <h2>Open</h2>

        <div
            id="status-1"
            class="ticket-list"
            data-status-id="1">
        </div>
    </div>

    <div class="column">
        <h2>In Progress</h2>

        <div
            id="status-2"
            class="ticket-list"
            data-status-id="2">
        </div>
    </div>

    <div class="column">
        <h2>Resolved</h2>

        <div
            id="status-3"
            class="ticket-list"
            data-status-id="3">
        </div>
    </div>

    <div class="column">
        <h2>Closed</h2>

        <div
            id="status-4"
            class="ticket-list"
            data-status-id="4">
        </div>
    </div>
</section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
