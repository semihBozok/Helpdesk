services:

  postgres:
    image: postgres:17
    container_name: helpdesk-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - helpdesk-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U helpdesk -d helpdesk"
        ]
      interval: 5s
      timeout: 5s
      retries: 10


  api:
    container_name: helpdesk-api
    restart: unless-stopped

    build:
      context: .
      dockerfile: Dockerfile

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__HelpdeskDb: "Host=postgres;Port=5432;Database=helpdesk;Username=helpdesk;Password=${POSTGRES_PASSWORD}"

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8080/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


volumes:
  helpdesk-postgres-data: